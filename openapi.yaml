openapi: 3.0.3
info:
  title: Expense Tracker API
  version: 1.0.0
servers:
  - url: http://localhost:5000
paths:
  /api/v1/auth/register:
    post:
      summary: Register user
      responses:
        "201":
          description: Created
  /api/v1/auth/login:
    post:
      summary: Login
      responses:
        "200":
          description: OK
  /api/v1/expenses:
    get:
      summary: List expenses
      responses:
        "200":
          description: OK
    post:
      summary: Create expense
      responses:
        "201":
          description: Created
  /api/v1/reports/tax-summary:
    get:
      summary: Tax summary
      responses:
        "200":
          description: OK
  /api/v1/reports/vat-return:
    get:
      summary: Download VAT return
      responses:
        "200":
          description: OK
  /api/v1/reports/cit-return:
    get:
      summary: Generate CIT return
      responses:
        "200":
          description: OK
  /api/v1/reports/alerts:
    get:
      summary: List alerts
      responses:
        "200":
          description: OK
  /api/v1/invoices:
    post:
      summary: Create invoice
      responses:
        "201":
          description: Created
  /api/v1/audit-logs:
    get:
      summary: List audit logs
      responses:
        "200":
          description: OK
