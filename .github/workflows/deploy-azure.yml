name: Deploy Azure

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "shared/**"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ vars.ACR_NAME }}.azurecr.io
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      BACKEND_APP_NAME: ${{ vars.AZURE_BACKEND_APP_NAME }}
      FRONTEND_APP_NAME: ${{ vars.AZURE_FRONTEND_APP_NAME }}
      FRONTEND_API_URL: ${{ vars.FRONTEND_API_URL }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps extension
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name containerapp --upgrade --yes

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build backend image
        run: docker build -t "$ACR_LOGIN_SERVER/expense-backend:$IMAGE_TAG" ./backend

      - name: Push backend image
        run: docker push "$ACR_LOGIN_SERVER/expense-backend:$IMAGE_TAG"

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL="$FRONTEND_API_URL" \
            -t "$ACR_LOGIN_SERVER/expense-frontend:$IMAGE_TAG" \
            ./frontend

      - name: Push frontend image
        run: docker push "$ACR_LOGIN_SERVER/expense-frontend:$IMAGE_TAG"

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name "$BACKEND_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/expense-backend:$IMAGE_TAG"

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name "$FRONTEND_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/expense-frontend:$IMAGE_TAG"

      - name: Show deployed URLs
        run: |
          BACKEND_FQDN=$(az containerapp show --name "$BACKEND_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
          FRONTEND_FQDN=$(az containerapp show --name "$FRONTEND_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
          echo "Backend URL: https://$BACKEND_FQDN"
          echo "Frontend URL: https://$FRONTEND_FQDN"
